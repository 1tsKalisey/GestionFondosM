name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-22.04  # Usar versión específica para consistencia
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages + accept licenses
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          ls -la "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" || true

      - name: Install system deps (toolchain + common headers)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-venv python3-dev \
            build-essential \
            autoconf automake libtool libtool-bin m4 pkg-config gettext \
            libltdl-dev \
            libffi-dev libssl-dev zlib1g-dev \
            libjpeg-dev libpng-dev libfreetype6-dev \
            libsqlite3-dev libbz2-dev liblzma-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer + pinned build helpers
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3" "buildozer==1.5.0" "python-for-android==2024.1.21"

      # Limpieza segura en CI (sin llamar a buildozer android clean)
      - name: Clean workspace
        run: |
          rm -rf .buildozer bin
          rm -rf ~/.buildozer/android/platform/build-* || true

      - name: Verify buildozer dependencies
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          spec = Path("buildozer.spec").read_text(encoding="utf-8")
          m = re.search(r"^\s*requirements\s*=\s*(.+)$", spec, re.MULTILINE)
          if not m:
              raise SystemExit("No se encontró la línea 'requirements =' en buildozer.spec")

          reqs = {x.strip().lower() for x in m.group(1).split(",") if x.strip()}
          required = {
              "python3",
              "kivy",
              "kivymd",
              "sqlalchemy",
              "aiohttp",
              "requests",
              "python-dotenv",
              "python-dateutil",
              "apscheduler",
              "tzlocal",
              "keyring",
              "google-auth",
              "google-auth-oauthlib",
              "requests-oauthlib",
              "oauthlib",
          }
          missing = sorted(required - reqs)
          if missing:
              raise SystemExit(
                  "Faltan dependencias en buildozer.spec requirements: "
                  + ", ".join(missing)
              )
          print("Dependencias Android verificadas correctamente.")
          PY

      - name: Create mobile .env for Android build
        run: |
          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
            echo "Falta FIREBASE_API_KEY en Secrets"
            exit 1
          fi
          {
            echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}"
            echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}"
            echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}"
            echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}"
            echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}"
            echo "FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}"
            echo "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
            echo "GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
            echo "GOOGLE_OAUTH_REDIRECT_URI=http://localhost:8080"
          } > src/.env
          test -s src/.env
          grep -q "^FIREBASE_API_KEY=" src/.env

      - name: Build APK (debug)
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          # Desactivar variables de compilación del host
          CC: ""
          CXX: ""
          CFLAGS: ""
          CXXFLAGS: ""
          LDFLAGS: ""
        run: |
          set -euxo pipefail
          # Limpiar variables de entorno que puedan interferir
          unset CC CXX CFLAGS CXXFLAGS LDFLAGS || true
          buildozer -v android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gestionfondosm-apk
          path: bin/*.apk
